<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Magic Link Authentication Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
        }
        .btn:hover {
            background: #45a049;
        }
        .btn-secondary {
            background: #2196F3;
        }
        .btn-secondary:hover {
            background: #0b7dda;
        }
        .btn-passkey {
            background: #FF9800;
        }
        .btn-passkey:hover {
            background: #F57C00;
        }
        .btn-passkey:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
        }
        .divider span {
            background: white;
            padding: 0 15px;
            color: #666;
        }
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid transparent;
            border-radius: 5px;
        }
        .alert-success {
            color: #3c763d;
            background-color: #dff0d8;
            border-color: #d6e9c6;
        }
        .alert-danger {
            color: #a94442;
            background-color: #f2dede;
            border-color: #ebccd1;
        }
    </style>
</head>
<body>
    <h1>Login with Magic Link</h1>
    
    <div class="container">
        <!-- Passkey Login Section -->
        <div id="passkeySection" style="display: none;">
            <p><strong>🔐 パスキーでログイン</strong></p>
            <p>生体認証やセキュリティキーを使って、すばやく安全にログインできます。</p>

            <button id="passkeyLoginBtn" class="btn btn-passkey" style="width: 100%; margin-bottom: 10px;">
                パスキーでログイン
            </button>
            <button id="discoverableLoginBtn" class="btn btn-passkey" style="width: 100%;">
                ワンタップログイン
            </button>

            <div class="divider">
                <span>または</span>
            </div>
        </div>

        <!-- Traditional Magic Link Login -->
        <div id="magicLinkSection">
            <p>メールアドレスを入力して、認証用のマジックリンクを受け取ってください。パスワードは不要です！</p>

            <div id="message"></div>

            <form id="loginForm" action="/auth/login" method="post">
                <div class="form-group">
                    <label for="email">メールアドレス:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">マジックリンクを送信</button>

                <div class="divider">
                    <span>または</span>
                </div>

                <button type="button" id="registerPasskeyBtn" class="btn btn-passkey" style="width: 100%;">
                    このデバイスでパスキーを作成
                </button>
            </form>
        </div>

        <div style="margin-top: 20px; text-align: center;">
            <a href="/" class="btn btn-secondary">ホームに戻る</a>
        </div>
    </div>

    <script>
        // WebAuthn support detection
        const isWebAuthnSupported = () => {
            return !!(navigator.credentials && navigator.credentials.create);
        };

        // Initialize page based on WebAuthn support
        document.addEventListener('DOMContentLoaded', function() {
            const passkeySection = document.getElementById('passkeySection');
            const passkeyLoginBtn = document.getElementById('passkeyLoginBtn');
            const discoverableLoginBtn = document.getElementById('discoverableLoginBtn');
            const registerPasskeyBtn = document.getElementById('registerPasskeyBtn');

            if (isWebAuthnSupported()) {
                passkeySection.style.display = 'block';

                // Check for conditional mediation support
                if (PublicKeyCredential.isConditionalMediationAvailable) {
                    PublicKeyCredential.isConditionalMediationAvailable().then(available => {
                        if (!available) {
                            discoverableLoginBtn.disabled = true;
                            discoverableLoginBtn.textContent = 'ワンタップログイン (非対応)';
                        }
                    });
                } else {
                    discoverableLoginBtn.disabled = true;
                    discoverableLoginBtn.textContent = 'ワンタップログイン (非対応)';
                }
            } else {
                registerPasskeyBtn.style.display = 'none';
            }
        });

        // Magic Link login form
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const messageDiv = document.getElementById('message');

            fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email: email }),
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    let messageHtml = `<div class="alert alert-success">${data.message}</div>`;

                    if (data.magic_link) {
                        messageHtml += `
                            <div class="alert alert-success" style="margin-top: 10px;">
                                <p>開発用マジックリンク:</p>
                                <a href="${data.magic_link}" class="magic-link" style="word-break: break-all;">${data.magic_link}</a>
                            </div>
                        `;
                    }

                    messageDiv.innerHTML = messageHtml;
                    document.getElementById('email').value = '';
                } else if (data.error) {
                    messageDiv.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                }
            })
            .catch(error => {
                messageDiv.innerHTML = `<div class="alert alert-danger">エラーが発生しました。再度お試しください。</div>`;
                console.error('Error:', error);
            });
        });

        // Helper functions
        const showMessage = (message, isError = false) => {
            const messageDiv = document.getElementById('message');
            const alertClass = isError ? 'alert-danger' : 'alert-success';
            messageDiv.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;
        };

        // Passkey registration
        document.getElementById('registerPasskeyBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value;
            if (!email) {
                showMessage('メールアドレスを入力してください。', true);
                return;
            }

            try {
                showMessage('パスキーを作成中...');

                const startResponse = await fetch('/webauthn/register/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                if (!startResponse.ok) {
                    const error = await startResponse.json();
                    throw new Error(error.error || '登録の開始に失敗しました');
                }

                const startData = await startResponse.json();

                // Use browser native API to parse creation options and create credential
                const credential = await navigator.credentials.create({
                    publicKey: PublicKeyCredential.parseCreationOptionsFromJSON(startData.options.publicKey)
                });

                // Use credential.toJSON() for base64url serialization
                const finishResponse = await fetch('/webauthn/register/finish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        challenge_id: startData.challenge_id,
                        response: credential.toJSON()
                    })
                });

                if (finishResponse.ok) {
                    showMessage('パスキーの作成が完了しました！次回からパスキーでログインできます。');
                } else {
                    const error = await finishResponse.json();
                    throw new Error(error.error || '登録の完了に失敗しました');
                }

            } catch (error) {
                console.error('Passkey registration error:', error);
                showMessage('パスキーの作成に失敗しました: ' + error.message, true);
            }
        });

        // Passkey login with email
        document.getElementById('passkeyLoginBtn').addEventListener('click', async function() {
            const email = prompt('メールアドレスを入力してください:');
            if (!email) return;

            try {
                await passkeyLogin(email);
            } catch (error) {
                console.error('Passkey login error:', error);
                showMessage('パスキーでのログインに失敗しました: ' + error.message, true);
            }
        });

        // Discoverable login
        document.getElementById('discoverableLoginBtn').addEventListener('click', async function() {
            try {
                await passkeyLogin();
            } catch (error) {
                console.error('Discoverable login error:', error);
                showMessage('ワンタップログインに失敗しました: ' + error.message, true);
            }
        });

        // Common passkey login function
        async function passkeyLogin(email = null) {
            showMessage('パスキーで認証中...');

            const startResponse = await fetch(email ? '/webauthn/login/start' : '/webauthn/login/discoverable', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: email ? JSON.stringify({ email: email }) : '{}'
            });

            if (!startResponse.ok) {
                const error = await startResponse.json();
                throw new Error(error.error || 'ログインの開始に失敗しました');
            }

            const startData = await startResponse.json();

            // Use browser native API to parse request options and get credential
            const assertion = await navigator.credentials.get({
                publicKey: PublicKeyCredential.parseRequestOptionsFromJSON(startData.options.publicKey)
            });

            // Use assertion.toJSON() for base64url serialization
            const finishResponse = await fetch('/webauthn/login/finish', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    challenge_id: startData.challenge_id,
                    response: assertion.toJSON()
                })
            });

            const finishData = await finishResponse.json();
            if (finishData.success) {
                showMessage('ログインに成功しました！リダイレクト中...');
                window.location.href = finishData.redirect_url || '/dashboard';
            } else {
                throw new Error(finishData.error || 'ログインに失敗しました');
            }
        }
    </script>
</body>
</html>
