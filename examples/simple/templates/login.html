<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Magic Link Authentication Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
        }
        .btn:hover {
            background: #45a049;
        }
        .btn-secondary {
            background: #2196F3;
        }
        .btn-secondary:hover {
            background: #0b7dda;
        }
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid transparent;
            border-radius: 5px;
        }
        .alert-success {
            color: #3c763d;
            background-color: #dff0d8;
            border-color: #d6e9c6;
        }
        .alert-danger {
            color: #a94442;
            background-color: #f2dede;
            border-color: #ebccd1;
        }
    </style>
</head>
<body>
    <h1>Login with Magic Link</h1>

    <div class="container">
        <p>メールアドレスを入力して、認証用のマジックリンクを受け取ってください。パスワードは不要です！</p>

        <div id="message"></div>

        <form id="loginForm" action="/auth/login" method="post">
            <div class="form-group">
                <label for="email">メールアドレス:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">マジックリンクを送信</button>
        </form>

        <div style="margin-top: 20px; text-align: center;">
            <a href="/" class="btn btn-secondary">ホームに戻る</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const messageDiv = document.getElementById('message');

            fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email }),
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    let messageHtml = '<div class="alert alert-success">' + data.message + '</div>';

                    if (data.magic_link) {
                        messageHtml += '<div class="alert alert-success" style="margin-top: 10px;">' +
                            '<p>開発用マジックリンク:</p>' +
                            '<a href="' + data.magic_link + '" style="word-break: break-all;">' + data.magic_link + '</a>' +
                            '</div>';
                    }

                    messageDiv.innerHTML = messageHtml;
                    document.getElementById('email').value = '';
                } else if (data.error) {
                    messageDiv.innerHTML = '<div class="alert alert-danger">' + data.error + '</div>';
                }
            })
            .catch(error => {
                messageDiv.innerHTML = '<div class="alert alert-danger">エラーが発生しました。再度お試しください。</div>';
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
