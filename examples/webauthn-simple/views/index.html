<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicLink + WebAuthn Example</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/webauthn/static/webauthn.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">ログイン</h1>

        {{if .Authenticated}}
            <div class="text-center">
                <div class="bg-green-100 text-green-800 p-4 rounded mb-4">
                    <strong>{{.UserID}}</strong> でログイン中
                </div>
                <a href="/dashboard" class="block w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 mb-2 text-center">ダッシュボード</a>
                <form action="/auth/logout" method="POST">
                    <button type="submit" class="w-full bg-gray-200 text-gray-800 py-2 rounded hover:bg-gray-300">ログアウト</button>
                </form>
            </div>
        {{else}}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">メールアドレス</label>
                    <input type="email" id="email" placeholder="user@example.com"
                           autocomplete="username webauthn"
                           class="w-full px-3 py-2 border rounded focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <!-- Magic Link -->
                <button onclick="sendMagicLink()" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">
                    マジックリンクを送信
                </button>

                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-300"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-400 text-sm">または</span>
                    <div class="flex-grow border-t border-gray-300"></div>
                </div>

                <!-- Passkey -->
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="registerPasskey()" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-700 text-sm">
                        パスキーを作成
                    </button>
                    <button onclick="loginPasskey()" class="bg-green-600 text-white py-2 rounded hover:bg-green-700 text-sm">
                        パスキーでログイン
                    </button>
                </div>

                <div id="message" class="hidden p-4 rounded text-sm text-center"></div>
            </div>
        {{end}}
    </div>

    {{if not .Authenticated}}
    <script>
        function showMessage(text, isError = false) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = isError
                ? 'p-4 rounded text-sm text-center bg-red-100 text-red-800'
                : 'p-4 rounded text-sm text-center bg-blue-100 text-blue-800';
        }

        // Magic Link
        async function sendMagicLink() {
            MagicLink.abortConditionalLogin();
            const email = document.getElementById('email').value;
            if (!email) return showMessage('メールアドレスを入力してください', true);

            try {
                showMessage('送信中...');
                const resp = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                }).then(r => r.json());

                if (resp.error) {
                    showMessage(resp.error, true);
                } else if (resp.magic_link) {
                    showMessage('開発モード: ');
                    const el = document.getElementById('message');
                    const a = document.createElement('a');
                    a.href = resp.magic_link;
                    a.textContent = 'マジックリンクを開く';
                    a.className = 'underline text-indigo-600';
                    el.appendChild(a);
                } else {
                    showMessage(resp.message);
                }
            } catch (e) {
                showMessage('エラーが発生しました', true);
            }
        }

        // Passkey Registration
        async function registerPasskey() {
            const email = document.getElementById('email').value;
            if (!email) return showMessage('メールアドレスを入力してください', true);

            try {
                showMessage('パスキーを作成中...');
                await MagicLink.register(email);
                showMessage('パスキーの作成が完了しました！');
            } catch (e) {
                showMessage('パスキーの作成に失敗しました: ' + e.message, true);
            }
        }

        // Passkey Login (with email)
        async function loginPasskey() {
            const email = document.getElementById('email').value;
            if (!email) return showMessage('メールアドレスを入力してください', true);

            try {
                showMessage('認証中...');
                await MagicLink.login(email);
            } catch (e) {
                showMessage('ログインに失敗しました: ' + e.message, true);
            }
        }

        // Conditional Mediation: show passkey suggestion on email field focus
        MagicLink.conditionalLogin();
    </script>
    {{end}}
</body>
</html>
